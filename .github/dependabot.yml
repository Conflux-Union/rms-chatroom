version: 2

updates:
  # Frontend pnpm monorepo
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Group all dev dependencies together
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
      # Group all production dependencies together
      prod-dependencies:
        patterns:
          - "*"
        dependency-type: "production"

  # Go backend
  - package-ecosystem: "gomod"
    directory: "/backend-go"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "backend"
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Android
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "android"
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"

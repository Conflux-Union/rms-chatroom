name: PR Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build web frontend
        run: pnpm build:web

      - name: Build electron renderer
        run: pnpm build:electron

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile $(find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*")

      - name: Run type checking (if mypy is available)
        run: |
          cd backend
          if pip list | grep -q mypy; then
            mypy . --ignore-missing-imports || true
          else
            echo "Skipping mypy (not installed)"
          fi

      - name: Start backend and verify health endpoint
        run: |
          cd backend
          # Create minimal test config (SSO token verification mode)
          cat > config.json << 'EOF'
          {
            "database_url": "sqlite+aiosqlite:///./test.db",
            "frontend_dist_path": "./dist",
            "sso_base_url": "https://sso.rms.net.cn",
            "sso_verify_endpoint": "/api/user",
            "host": "127.0.0.1",
            "port": 8000,
            "debug": false,
            "cors_origins": ["http://localhost:5173"]
          }
          EOF

          # Create dummy frontend dist directory
          mkdir -p dist

          # Start backend in background
          python -m backend &
          BACKEND_PID=$!

          # Wait for backend to start (max 30 seconds)
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/system/health > /dev/null 2>&1; then
              echo "Backend started successfully"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start within 30 seconds"
              kill $BACKEND_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Verify health endpoint returns ok status
          HEALTH_RESPONSE=$(curl -s http://127.0.0.1:8000/api/system/health)
          echo "Health response: $HEALTH_RESPONSE"

          if echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
            echo "Health check passed"
          else
            echo "Health check failed - unexpected response"
            kill $BACKEND_PID 2>/dev/null || true
            exit 1
          fi

          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true
          echo "Backend health check completed successfully"

  android-build:
    name: Android Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

  all-checks-passed:
    name: All Checks Passed
    needs: [frontend-build, backend-check, android-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check if all jobs succeeded
        run: |
          if [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.backend-check.result }}" != "success" ] || \
             [ "${{ needs.android-build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed successfully"

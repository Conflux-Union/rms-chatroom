name: PR Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/pr-checks.yml'
            backend:
              - 'backend-go/**'
              - '.github/workflows/pr-checks.yml'
            android:
              - 'android/**'
              - '.github/workflows/pr-checks.yml'

  frontend-build:
    name: Frontend Build Check
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build web frontend
        run: pnpm build:web

      - name: Build electron renderer
        run: pnpm build:electron

  go-backend-check:
    name: Go Backend Check
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
        env:
          GOTOOLCHAIN: auto

      - name: Build
        run: |
          cd backend-go
          go build ./...

      - name: Vet
        run: |
          cd backend-go
          go vet ./...

  android-build:
    name: Android Build Check
    needs: detect-changes
    if: needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

  all-checks-passed:
    name: All Checks Passed
    needs: [detect-changes, frontend-build, go-backend-check, android-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check if all jobs succeeded
        run: |
          # Helper function to check job result
          check_result() {
            local result="$1"
            local name="$2"
            if [ "$result" == "skipped" ]; then
              echo "✅ $name: skipped (no changes)"
              return 0
            elif [ "$result" == "success" ]; then
              echo "✅ $name: passed"
              return 0
            else
              echo "❌ $name: failed ($result)"
              return 1
            fi
          }

          failed=0
          check_result "${{ needs.frontend-build.result }}" "Frontend Build" || failed=1
          check_result "${{ needs.go-backend-check.result }}" "Go Backend" || failed=1
          check_result "${{ needs.android-build.result }}" "Android Build" || failed=1

          if [ $failed -eq 1 ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi
          echo ""
          echo "All checks passed successfully"
